<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1280" viewBox="0 0 960 1280">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E23B4A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1d2b45" flood-opacity="0.18"/></filter>
</defs>
<rect width="960" height="1280" fill="#F5F7FB"/>
<text x="72" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#26334A">6.9 帮助与设置模块：规则说明和纠错开关</text>
<rect x="72" y="84" width="420" height="1040" rx="34" fill="#FFFFFF" stroke="#26334A" stroke-width="4" filter="url(#shadow)"/>
<rect x="92" y="108" width="380" height="992" rx="22" fill="#DFF4FF" stroke="#D8DEE9" stroke-width="1" />
<text x="282.0" y="154" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#26334A" text-anchor="middle">帮助与设置</text>
<rect x="116" y="176" width="92" height="42" rx="12" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2" />
<text x="162.0" y="204" font-family="Arial, PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#26334A" text-anchor="middle">帮助</text>
<rect x="328" y="176" width="92" height="42" rx="12" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2" />
<text x="374.0" y="204" font-family="Arial, PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#26334A" text-anchor="middle">设置</text>
<rect x="116" y="260" width="312" height="250" rx="18" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="3" filter="url(#shadow)"/>
<text x="272" y="310" font-family="Arial, PingFang SC, sans-serif" font-size="26" font-weight="700" fill="#26334A" text-anchor="middle">基础规则</text>
<text x="150" y="360" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#26334A" text-anchor="start">每行一个皇冠</text>
<text x="150" y="394" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#26334A" text-anchor="start">每列一个皇冠</text>
<text x="150" y="428" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#26334A" text-anchor="start">每个颜色区域一个皇冠</text>
<text x="150" y="462" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#26334A" text-anchor="start">皇冠不能相邻</text>
<rect x="116" y="590" width="312" height="116" rx="18" fill="#FFF8ED" stroke="#F0C36A" stroke-width="2" />
<text x="150" y="634" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="700" fill="#26334A" text-anchor="start">即时纠错</text>
<text x="150" y="672" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#536278" text-anchor="start">开 / 关冲突红框显示</text>
<circle cx="548" cy="190" r="20" fill="#E23B4A"/>
<text x="548" y="197" font-family="Arial, PingFang SC, sans-serif" font-size="21" font-weight="700" fill="#fff" text-anchor="middle">1</text>
<text x="580" y="187" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="700" fill="#26334A" text-anchor="start">帮助入口</text>
<text x="580" y="217" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#536278" text-anchor="start">玩家可随时查看四条核心规则，降低上手成本。</text>
<line x1="208" y1="190" x2="532" y2="190" stroke="#E23B4A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<circle cx="548" cy="390" r="20" fill="#E23B4A"/>
<text x="548" y="397" font-family="Arial, PingFang SC, sans-serif" font-size="21" font-weight="700" fill="#fff" text-anchor="middle">2</text>
<text x="580" y="387" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="700" fill="#26334A" text-anchor="start">弹窗说明</text>
<text x="580" y="417" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#536278" text-anchor="start">帮助弹窗只解释玩法，不改变当前棋盘状态。</text>
<line x1="428" y1="350" x2="532" y2="390" stroke="#E23B4A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<circle cx="548" cy="640" r="20" fill="#E23B4A"/>
<text x="548" y="647" font-family="Arial, PingFang SC, sans-serif" font-size="21" font-weight="700" fill="#fff" text-anchor="middle">3</text>
<text x="580" y="637" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="700" fill="#26334A" text-anchor="start">设置开关</text>
<text x="580" y="667" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="400" fill="#536278" text-anchor="start">目前主要切换即时纠错显示，未来扩展音效等设置。</text>
<line x1="428" y1="646" x2="532" y2="640" stroke="#E23B4A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>